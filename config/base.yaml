app:
  host: "0.0.0.0"
  port: 8000
  log_level: "info"

# Component configuration
# The system uses OpenAI's Realtime API which combines LLM+TTS in a single connection.
components:
  realtime:
    primary: openai_realtime     # → adapters/realtime/openai_realtime.py
    model: gpt-4o-realtime-preview
  avatar:
    primary: simli
    fallback: [stub_avatar]
    # Avatar adapter options:
    #
    # simli (primary — real-time lip-synced avatars)
    #   - Accepts 16kHz PCM audio, returns JPEG frames over binary WebSocket
    #   - <300ms latency; works with OpenAI Realtime API audio output
    #   - Set SIMLI_API_KEY environment variable to enable
    #   - Preset face IDs: https://docs.simli.com/api-reference/preset-faces
    simli:
      face_id: "5514e24d-6086-46a3-ace4-6a7264e5cb7c"
      api_key_env: "SIMLI_API_KEY"
      resolution: [512, 512]
      fps: 25
      min_chunk_ms: 100
      target_sample_rate: 16000  # Resampled from 24kHz OpenAI Realtime output
    #
    # mock_cloud_avatar (RECOMMENDED for development)
    #   - Simulates cloud service with configurable latency
    #   - Works without external API keys
    #   - Exercises full pipeline
    mock_cloud_avatar:
      simulated_latency_ms: 150
      resolution: [512, 512]
      fps: 25

# Persona definitions with emotion and character defaults
# Each persona can be selected via persona_id when creating a session
personas:
  default:
    name: "Assistant"
    emotion:
      label: neutral
      intensity: 0.5
      valence: 0.0
      arousal: 0.0
    character:
      persona_id: default
      speech_rate: 1.0
      pitch_shift: 0.0
      expressivity: 0.6
      motion_gain: 1.0
  professional:
    name: "Professional"
    emotion:
      label: neutral
      intensity: 0.3
      valence: 0.1
      arousal: -0.1
    character:
      persona_id: professional
      speech_rate: 0.95
      pitch_shift: 0.0
      expressivity: 0.4
      motion_gain: 0.7
  casual:
    name: "Casual"
    emotion:
      label: happy
      intensity: 0.4
      valence: 0.3
      arousal: 0.1
    character:
      persona_id: casual
      speech_rate: 1.05
      pitch_shift: 0.0
      expressivity: 0.7
      motion_gain: 1.1
  excited:
    name: "Excited"
    emotion:
      label: happy
      intensity: 0.8
      valence: 0.7
      arousal: 0.6
    character:
      persona_id: excited
      speech_rate: 1.2
      pitch_shift: 0.05
      expressivity: 0.9
      motion_gain: 1.5
