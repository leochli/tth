# Offline mock profile for development and CI testing
# Uses mock adapters without external API dependencies
components:
  llm:
    mode: api
    primary: mock_llm
    model: mock
    fallback: []
  tts:
    mode: api
    primary: mock_tts
    model: mock
    fallback: []
  avatar:
    mode: api
    primary: mock_cloud_avatar  # Simulates cloud avatar with configurable latency
    fallback: [stub_avatar]
    mock_cloud_avatar:
      simulated_latency_ms: 150
      resolution: [512, 512]
      fps: 25
